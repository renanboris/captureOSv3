<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Capture OS v3 — Configurações</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      padding: 32px;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 28px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { margin: 0 0 24px; font-size: 13px; color: #64748b; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .hint { font-size: 11px; color: #94a3b8; margin: 4px 0 18px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 13px;
    }
    .btn {
      margin-top: 8px;
      padding: 10px 18px;
      background: #0b5ce3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #0949b6; }
    #status { margin-left: 12px; font-size: 13px; color: #16a34a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Configurações do Capture OS v3</h1>
    <p class="sub">Defina o backend de produção e o token de autenticação.</p>

    <label for="backendUrl">URL do Backend</label>
    <input type="text" id="backendUrl" placeholder="https://api.captureos.fly.dev" autocomplete="off">
    <p class="hint">Endpoint do backend implantado. Em desenvolvimento, deixe em branco para usar o fallback local.</p>

    <label for="authToken">Token de Autenticação (Bearer)</label>
    <input type="password" id="authToken" placeholder="cole o JWT aqui" autocomplete="off">
    <p class="hint">Enviado como cabeçalho Authorization: Bearer em todas as requisições ao backend.</p>

    <button id="save" class="btn">Salvar</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
