<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Capture OS v3 — Configurações</title>
  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F9FAFB;
      --bg-glass: #FFFFFF;
      --border-glass: #E5E7EB;
      --border-default: #E5E7EB;
      --text-primary: #111827;
      --text-secondary: #4B5563;
      --text-muted: #9CA3AF;
      --accent-primary: #00998F;
      --accent-hover: #00AF9B;
      --input-bg: #FFFFFF;
      --input-border: #D1D5DB;
      --success-green: #34C759;
      --card-bg: #FFFFFF;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      margin: 0;
      padding: 32px;
      min-height: 100vh;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    /* ── Branding header ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    p.sub {
      margin: 0 0 28px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin: 4px 0 18px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]::placeholder, input[type="password"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(0, 153, 143, 0.1);
    }

    /* ── Button ── */
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      padding: 10px 18px;
      background: var(--accent-primary);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.97); }

    /* ── Save success indicator ── */
    #status {
      font-size: 13px;
      color: var(--success-green);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #status:not(:empty) {
      opacity: 1;
    }

    #status:not(:empty)::before {
      content: "✓ ";
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 4-point sparkle -->
        <path d="M11 2L8.5 8.5L2 11L8.5 13.5L11 20L13.5 13.5L20 11L13.5 8.5L11 2Z" 
              fill="var(--accent-primary)" opacity="0.9"/>
        <path d="M19 3L17.5 6.5L14 8L17.5 9.5L19 13L20.5 9.5L24 8L20.5 6.5L19 3Z" 
              fill="var(--accent-primary)" opacity="0.5"/>
        <path d="M5 16L4 18.5L1.5 19.5L4 20.5L5 23L6 20.5L8.5 19.5L6 18.5L5 16Z" 
              fill="var(--accent-primary)" opacity="0.4"/>
      </svg>
      <h1>Capture OS v3</h1>
    </div>
    <p class="sub">Defina o backend de produção e o token de autenticação.</p>

    <label for="backendUrl">URL do Backend</label>
    <input type="text" id="backendUrl" placeholder="https://api.captureos.fly.dev" autocomplete="off">
    <p class="hint">Endpoint do backend implantado. Em desenvolvimento, deixe em branco para usar o fallback local.</p>

    <label for="authToken">Token de Autenticação (Bearer)</label>
    <input type="password" id="authToken" placeholder="cole o JWT aqui" autocomplete="off">
    <p class="hint">Enviado como cabeçalho Authorization: Bearer em todas as requisições ao backend.</p>

    <div class="actions">
      <button id="save" class="btn">Salvar</button>
      <span id="status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
