<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Capture OS v3</title>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      text-align: center;
      background: #f8fafc;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      color: #0f172a;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    #btn-start {
      background: #3b82f6;
      color: white;
    }
    #btn-start:hover {
      background: #2563eb;
    }
    #btn-stop {
      background: #ef4444;
      color: white;
      display: none;
    }
    #btn-stop:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <h2>Frictionless Capture</h2>
  <button id="btn-start">▶ Iniciar Gravação</button>
  <button id="btn-stop">⏹ Parar e Enviar</button>

  <script src="popup.js"></script>
</body>
</html>
