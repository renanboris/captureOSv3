<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#8203;</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- TELA DE INÍCIO (Start Screen) -->
        <div id="start-screen">
            <div class="start-content">
                <h2>Prática Guiada</h2>
                <p>Clique abaixo para iniciar a simulação passo a passo.</p>
                <button id="btn-start" class="btn-play">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"></polygon></svg>
                    Iniciar Prática
                </button>
            </div>
        </div>
        <main>
            <div id="simulacao-container">
                <img id="imagem-bg" src="" alt="Simulação">
                <div id="overlay-cliques"></div>
            </div>
            
            <!-- Widget de Prática Ativa (HUD) -->
            <div id="capture-os-sandbox-widget">
                <div class="widget-header">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="pulse-dot"></div>
                        <span class="widget-title">PRÁTICA ATIVA</span>
                    </div>
                    <div id="sandbox-xp" class="xp-badge">0 XP</div>
                </div>
                <div id="sandbox-widget-content">
                    <div id="passo-header" class="passo-info">Passo 0 de 0</div>
                    <div id="ancora-texto" class="instrucao-texto">Carregando Módulo...</div>
                </div>
                <div class="widget-footer">
                    <button id="btn-voltar-passo" class="btn-action btn-danger">Voltar</button>
                    <div style="display: flex; gap: 8px;">
                        <button id="btn-dica-pratica" class="btn-action btn-secondary">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg> Dica
                        </button>
                    </div>
                </div>
            </div>

            <div id="feedback-container" class="hidden"></div>
        </main>
    </div>
    <script src="js/scorm-api.js"></script>
    <script src="data/steps.js"></script>
    <script src="data/quiz.js" onerror="this.remove()"></script>
    <script src="js/try-player.js"></script>
</body>
</html>
