<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptureOS - Editor de Roteiro</title>
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <div class="editor-container">
        <header>
            <h1>Revisão de Roteiro</h1>
            <div style="display: flex; gap: 16px; align-items: center;">
                <select id="voice-selector" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-size: 13px; font-weight: 500; color: #475569; outline: none; cursor: pointer;">
                    <option value="Portuguese_Casual_Speaker_v1">Casual (Masculino)</option>
                    <option value="Portuguese_Solemn_Speaker_v1">Solene (Masculino)</option>
                    <option value="Portuguese_Deep-VoicedGentleman">Voz Grave (Masculino)</option>
                    <option value="Portuguese_ReservedYoungMan">Jovem Reservado (Masculino)</option>
                    <option value="Portuguese_SweetGirl">Doce (Feminino)</option>
                    <option value="Portuguese_LovelyLady">Amável (Feminino)</option>
                    <option value="Portuguese_SentimentalLady">Sentimental (Feminino)</option>
                </select>
                <label id="overlay-toggle-label" title="Aplica uma moldura decorativa ao redor do vídeo" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: #475569; user-select: none;">
                    <span class="overlay-switch">
                        <input type="checkbox" id="toggle-overlay" checked>
                        <span class="overlay-slider"></span>
                    </span>
                    Moldura
                </label>
                <button id="btn-cancel" class="btn-secondary" style="background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; color: #64748b;">Cancelar</button>
                <button id="btn-render" class="btn-primary">Finalizar e Gerar Vídeo</button>
            </div>
        </header>
        <main id="passos-container">
            <!-- Passos serão injetados aqui -->
            <div class="loading">Carregando roteiro...</div>
        </main>
    </div>
    
    <!-- Modal de Avaliação (NPS/Estrelas) -->
    <div id="rating-modal" class="rating-modal" style="display: none;">
        <div class="rating-content">
            <h2>Processo Concluído!</h2>
            <p>Como foi sua experiência gravando e editando este material hoje?</p>
            <div class="stars-container" id="stars-container">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <div id="rating-success-message" style="display: none; color: #10b981; font-weight: 500; margin-top: 10px;">
                Obrigado pela sua avaliação! ✅
            </div>
            <button id="btn-skip-rating" class="btn-secondary" style="margin-top: 20px;">Pular e Continuar</button>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
