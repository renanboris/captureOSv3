<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simlink - Prática</title>
    <link rel="stylesheet" href="simlink.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="titulo-modulo">Carregando Módulo...</h1>
            <div id="stats">XP: <span id="xp-total">0</span> | Passo: <span id="passo-atual">0</span>/<span id="total-passos">0</span></div>
        </header>
        <main>
            <div id="instrucao-container" class="hidden">
                <p id="ancora-texto"></p>
            </div>
            <div id="simulacao-container">
                <img id="imagem-bg" src="" alt="Simulação">
                <div id="overlay-cliques"></div>
            </div>
            <div id="feedback-container" class="hidden"></div>
        </main>
    </div>
    <script src="simlink.js"></script>
</body>
</html>
